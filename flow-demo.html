<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FAQ運用フロー</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:40px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

.flow{
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
}

.step{
padding:20px;
border-left:6px solid #ff9f43;
background:#fff7ed;
font-size:16px;
}

.arrow{
text-align:center;
font-size:24px;
}

.note{
margin-top:30px;
padding:20px;
background:#f0f8ff;
border-left:6px solid #3498db;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h1>FAQ運用フロー設計（AI活用）</h1>

<p>
問い合わせ対応の効率化を想定し、
生成AIと人の確認を組み合わせた運用フローを設計しました。
</p>


<div class="flow">

<div class="step">
① 問い合わせ発生
</div>

<div class="arrow">↓</div>

<div class="step">
② ChatGPTで回答下書き生成
</div>

<div class="arrow">↓</div>

<div class="step">
③ 人が内容確認・修正
</div>

<div class="arrow">↓</div>

<div class="step">
④ CMSでFAQ更新
</div>

<div class="arrow">↓</div>

<div class="step">
⑤ サイト公開・反映確認
</div>

<div class="arrow">↓</div>

<div class="step">
⑥ 問い合わせ減少・業務効率化
</div>

</div>


<div class="note">

想定ポイント<br>

・AIをそのまま使わない運用<br>
・人による確認を入れる設計<br>
・CMS更新を前提とした構成<br>
・実務で使えるフローを想定

</div>

</div>

</body>
</html>
