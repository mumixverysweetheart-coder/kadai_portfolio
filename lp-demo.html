<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LP改善デモ</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:40px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.section{
margin-bottom:60px;
}

h1{
margin-top:0;
}

.box{
border:1px solid #ddd;
padding:20px;
margin-top:20px;
}

.bad{
background:#fff5f5;
border-left:6px solid red;
}

.good{
background:#f0fff4;
border-left:6px solid green;
}

.price{
font-size:26px;
font-weight:bold;
color:#e60023;
}

button{
padding:15px 25px;
font-size:16px;
border:none;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:10px;
}

.bad button{
margin-top:40px;
background:gray;
}

.note{
margin-top:20px;
padding:15px;
background:#f0f8ff;
border-left:6px solid #3498db;
}

</style>
</head>

<body>

<div class="container">

<h1>商品LP改善デモ</h1>



<div class="section">

<h2>改善前</h2>

<div class="box bad">

<h3>シンプルTシャツ</h3>

<p>
商品の説明が長く続き、
購入ボタンが下に配置されている構成。
</p>

<p>
ユーザーが購入まで迷いやすい。
</p>

<div class="price">¥3,980</div>

<button>購入する</button>

</div>

<div class="note">

問題点<br>
・ボタンが遠い<br>
・価格が目立たない<br>
・余白が不自然<br>
・導線が弱い

</div>

</div>



<div class="section">

<h2>改善後</h2>

<div class="box good">

<h3>シンプルコットンTシャツ</h3>

<div class="price">¥3,980</div>

<button>購入する</button>

<p>
価格 → ボタン → 説明の順に配置し、
視線誘導を意識したレイアウトに変更。
</p>

<p>
余白を整理し、
CTAを目立たせる構成に改善。
</p>

</div>

<div class="note">

改善内容<br>
・価格付近にボタン配置<br>
・余白調整<br>
・情報順整理<br>
・CTA強調<br>
・導線改善

</div>

</div>



</div>

</body>
</html>
